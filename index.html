<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Firefly Synchronization Demo</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
    }
    #controls {
      position: absolute;
      left: 8px;
      top: 8px;
      background: rgba(0, 0, 0, 0.72);
      padding: 12px;
      border-radius: 8px;
      max-width: 260px;
      z-index: 10;
    }
    label {
      display: block;
      margin: 8px 0 4px;
      font-size: 0.95rem;
    }
    input[type="range"] {
      width: 100%;
    }
  </style>
</head>
<body>
  <div id="controls">
    <h3>Firefly Sync Demo</h3>
    <label>Simulation</label>
    <select id="simulationSelect">
      <option value="kuramoto">Kuramoto phase model</option>
      <option value="mirollo">Mirollo-Strogatz pulse model</option>
    </select>

    <label>K (coupling)</label>
    <input id="kSlider" type="range" min="0" max="4" step="0.01" value="1.5" />
    <div id="kValue">1.50</div>

    <label>Noise</label>
    <input id="noiseSlider" type="range" min="0" max="0.5" step="0.01" value="0.05" />
    <div id="noiseValue">0.05</div>

    <label>Activation strength</label>
    <input id="epsilonSlider" type="range" min="0" max="0.2" step="0.01" value="0.08" />
    <div id="epsilonValue">0.08</div>

    <label>Oscillators</label>
    <input id="nSlider" type="range" min="10" max="120" step="1" value="60" />
    <div id="nValue">60</div>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.6.0/p5.min.js"></script>
  <script src="js/kuramoto_sim.js"></script>
  <script src="js/mirollo_sim.js"></script>
  <script src="sketch.js"></script>
</body>
</html>
